schema-version = "1.10.0"

[install]
git.pkg-path = "git"
gh.pkg-path = "gh"
direnv.pkg-path = "direnv"
jq.pkg-path = "jq"
ripgrep.pkg-path = "ripgrep"
fd.pkg-path = "fd"
bat.pkg-path = "bat"
eza.pkg-path = "eza"
nix.pkg-path = "nix"
nixd.pkg-path = "nixd"
nixfmt-rfc-style.pkg-path = "nixfmt-rfc-style"
deadnix.pkg-path = "deadnix"
statix.pkg-path = "statix"
nix-tree.pkg-path = "nix-tree"

[vars]
WORKSPACE_OWNER = "RogerNavelsaker"
WORKSPACE_META = "nix-repos"

[hook]
on-activate = '''
  export META_REPO_ROOT="$FLOX_ENV_PROJECT"
  export SHARED_WORKSPACE_ROOT="$FLOX_ENV_PROJECT"
'''

[profile]
common = """
  config() { cd "$SHARED_WORKSPACE_ROOT/nix-config"; }
  lib() { cd "$SHARED_WORKSPACE_ROOT/nix-lib"; }
  secrets() { cd "$SHARED_WORKSPACE_ROOT/nix-secrets"; }
  keys() { cd "$SHARED_WORKSPACE_ROOT/nix-keys"; }

  alias workspace-bootstrap="$META_REPO_ROOT/scripts/bootstrap"
  alias workspace-status="$META_REPO_ROOT/scripts/status"
  alias status-all="$META_REPO_ROOT/scripts/status"
  alias pull-all="$META_REPO_ROOT/scripts/pull-all"
  alias push-all="$META_REPO_ROOT/scripts/push-all"
  alias update-all="$META_REPO_ROOT/scripts/update-all"
  alias check-all="$META_REPO_ROOT/scripts/check-all"
  alias check='nix flake check --no-build'
  alias fmt='nixfmt .'
  alias show='nix flake show'
"""

[options]
systems = ["x86_64-linux"]
