schema-version = "1.10.0"

[install]

[vars]

[hook]
on-activate = '''
  # Guard: Only run in the physical meta-repo directory
  if [ "$(pwd -P)" != "/home/rona/Repositories/RogerNavelsaker/nix-repos" ]; then
    return
  fi

  # Symlink nix repos
  for r in ../nix-config ../nix-lib ../nix-secrets ../nix-keys; do
    if [ -d "$r" ] && [ "$(basename "$r")" != "nix-repos" ]; then
      ln -snf "$r" .
    fi
  done
'''
